<template>
    <div class={isCurrentPageNotificationMessage} onclick={gotoNotificafionCenter} if:true={showNotification}>
        <div class="bell">
            <c-base-icon image-url="icons/alert/notifications.svg#notifications" style="margin-top: -1px;" width="20" height="20"></c-base-icon>
        </div>
        <div class="new-message-indicator">
            <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 10 10" fill="none">
                <circle cx="5" cy="5" r="5" fill="#FF934F"/>
            </svg>
        </div>
    </div>

    
    <div class={isCurrentPageNotification} onclick={gotoNotificafionCenter} if:false={showNotification}>
        <c-base-icon image-url="icons/alert/notifications.svg#notifications" style="margin-top: -1px;" width="20" height="20"></c-base-icon>
    </div>
</template>
