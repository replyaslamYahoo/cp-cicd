name: Feature Branch CI

on:
  pull_request:
    branches: [ develop ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate to Dev1 org
        run: |
          echo "${{ secrets.SFDX_AUTH_URL_DEV1 }}" > /tmp/dev.txt
          sf org login sfdx-url --sfdx-url-file /tmp/dev.txt --set-default
          rm /tmp/dev.txt

      - name: Validate deploy
        run: |
          sf project deploy validate \
            --source-dir force-app \
            --test-level RunLocalTests

      - name: Cleanup
        if: always()
        run: rm -f /tmp/dev.txt