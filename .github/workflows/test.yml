name: Deploy to Test Org

on:
  push:
    branches: [ test ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate to Test1 org
        run: |
          echo "${{ secrets.SFDX_AUTH_URL_TEST1 }}" > /tmp/test.txt
          sf org login sfdx-url --sfdx-url-file /tmp/test.txt --set-default
          rm /tmp/test.txt

      - name: Deploy
        run: |
          sf project deploy start \
            --source-dir force-app \
            --test-level RunAllTestsInOrg

      - name: Cleanup
        if: always()
        run: rm -f /tmp/test.txt