name: Deploy to Dev Org

on:
  push:
    branches: [ develop ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate to Dev scratch org
        run: |
          echo "${{ secrets.SFDX_AUTH_URL_DEV }}" > /tmp/dev.txt
          sf org login sfdx-url --sfdx-url-file /tmp/dev.txt --set-default
          rm /tmp/dev.txt

      - name: Deploy
        run: |
          sf project deploy start \
            --source-dir force-app \
            --test-level RunLocalTests

      - name: Cleanup
        if: always()
        run: rm -f /tmp/dev.txt